<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyYebLbh6EwNMN0EEbjBtZwEGCVaOmBepBfK38ZES2DA86Jao67XfZIe_070iD9pwHmpQ/exec';

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function loadData() {
  const res = await fetch(API_URL);
  if (!res.ok) throw new Error('API error');
  return res.json();
}

function parseMarkdown(raw) {
  if (!raw) return '';

  const lines = raw.split('\n');
  let html = '';
  let i = 0;

  function parseInline(s) {
    return s
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/___(.+?)___/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/__(.+?)__/g, '<strong>$1</strong>')
      .replace(/\*([^*]+?)\*/g, '<em>$1</em>')
      .replace(/_([^_]+?)_/g, '<em>$1</em>')
      .replace(/~~(.+?)~~/g, '<del>$1</del>')
      .replace(/`([^`]+?)`/g, '<code>$1</code>');
  }

  function slugify(s) {
    return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function peekListType(line) {
    if (/^(\s*)[-*+]\s/.test(line)) return 'ul';
    if (/^(\s*)\d+[.)]\s/.test(line)) return 'ol';
    return null;
  }

  function getIndent(line) {
    return (line.match(/^(\s*)/) || ['', ''])[1].length;
  }

  function parseList(lines, start, baseIndent) {
    const type = peekListType(lines[start]);
    let out = `<${type}>`;
    let idx = start;
    while (idx < lines.length) {
      const line = lines[idx];
      if (!line.trim()) { idx++; continue; }
      const indent = getIndent(line);
      const lt = peekListType(line);
      if (!lt || indent < baseIndent) break;
      if (indent > baseIndent && lt) {
        const nested = parseList(lines, idx, indent);
        out = out.slice(0, -5) + nested + `</${type}>`;
        idx = nested._end;
        out += `</${type}>`;
        out = out.slice(0, -`</${type}>`.length * 2) + `</${type}>`;
        const sub = parseList(lines, idx, indent);
        out = out.replace(/<\/li>\s*$/, sub.html + '</li>');
        idx = sub._end;
        continue;
      }
      const text = line.replace(/^\s*[-*+]\s/, '').replace(/^\s*\d+[.)]\s/, '');
      out += `<li>${parseInline(text)}`;
      idx++;
      if (idx < lines.length && peekListType(lines[idx]) && getIndent(lines[idx]) > indent) {
        const sub = parseList(lines, idx, getIndent(lines[idx]));
        out += sub.html;
        idx = sub._end;
      }
      out += '</li>';
    }
    out += `</${type}>`;
    return { html: out, _end: idx };
  }

  while (i < lines.length) {
    const line = lines[i];

    if (line.startsWith('```')) {
      const lang = line.slice(3).trim();
      i++;
      const codeLines = [];
      while (i < lines.length && !lines[i].startsWith('```')) {
        codeLines.push(lines[i]);
        i++;
      }
      i++;
      const codeEsc = codeLines
        .map(l => l.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'))
        .join('\n');
      html += `<pre><code${lang ? ` class="language-${lang}"` : ''}>${codeEsc}</code></pre>`;
      continue;
    }

    if (/^\s*\|/.test(line) && line.includes('|')) {
      const tableLines = [];
      while (i < lines.length && /^\s*\|/.test(lines[i]) && lines[i].includes('|')) {
        tableLines.push(lines[i]);
        i++;
      }
      let thead = '', tbody = '', headerDone = false;
      tableLines.forEach((tl, ti) => {
        if (/^[\s|:-]+$/.test(tl)) { headerDone = true; return; }
        const cells = tl.split('|').map(c => c.trim()).filter((_, ci, a) => ci > 0 && ci < a.length - 1);
        if (!headerDone && ti === 0) {
          thead = `<thead><tr>${cells.map(c => `<th>${parseInline(c)}</th>`).join('')}</tr></thead>`;
        } else {
          tbody += `<tr>${cells.map(c => `<td>${parseInline(c)}</td>`).join('')}</tr>`;
        }
      });
      html += `<table>${thead}<tbody>${tbody}</tbody></table>`;
      continue;
    }

    if (peekListType(line)) {
      const res = parseList(lines, i, getIndent(line));
      html += res.html;
      i = res._end;
      continue;
    }

    if (/^#{1,6}\s/.test(line)) {
      const m = line.match(/^(#{1,6})\s+(.+)/);
      if (m) {
        const lvl = m[1].length;
        const txt = parseInline(m[2].trim());
        const id = slugify(m[2].trim());
        html += `<h${lvl} id="${id}">${txt}</h${lvl}>`;
      }
      i++; continue;
    }

    if (/^>\s?/.test(line)) {
      const bqLines = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        bqLines.push(lines[i].replace(/^>\s?/, ''));
        i++;
      }
      html += `<blockquote><p>${parseInline(bqLines.join(' '))}</p></blockquote>`;
      continue;
    }

    if (/^[-*_]{3,}$/.test(line.trim())) {
      html += '<hr>';
      i++; continue;
    }

    if (line.trim() === '') { i++; continue; }

    html += `<p>${parseInline(line.trim())}</p>`;
    i++;
  }

  return html;
}

function buildTOC(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const headings = tmp.querySelectorAll('h2,h3');
  if (headings.length < 2) return '';
  const items = Array.from(headings).map(h => {
    const cls = h.tagName === 'H3' ? ' class="toc-h3"' : '';
    return `<li><a href="#${h.id}"${cls}>${h.textContent}</a></li>`;
  }).join('');
  return `<div class="sidebar-card"><div class="sidebar-label">In This Article</div><ul class="toc-list">${items}</ul></div>`;
}

function initTOCHighlight() {
  const links = document.querySelectorAll('.toc-list a');
  if (!links.length) return;
  const headingIds = Array.from(links).map(a => a.getAttribute('href').slice(1));
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(a => a.classList.remove('active'));
        const link = document.querySelector(`.toc-list a[href="#${entry.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-68px 0px -70% 0px' });
  headingIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) observer.observe(el);
  });
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    ['copy-btn', 'copy-btn-sidebar'].forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> Copy Link`;
        btn.classList.remove('copied');
      }, 2000);
    });
  });
}

function formatDate(raw) {
  if (!raw) return '';
  const d = new Date(raw);
  if (isNaN(d.getTime())) return raw;
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
}

function initProgressBar() {
  const bar = document.getElementById('progress-bar');
  window.addEventListener('scroll', () => {
    const scrolled = window.scrollY;
    const total = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (total > 0 ? (scrolled / total * 100) : 0) + '%';
  }, { passive: true });
}

async function loadArticle(cfg) {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const container = document.getElementById('page-content');
  const site = cfg.site || {};

  if (!slug) {
    container.innerHTML = `<div class="error-state"><h2>No Article Specified</h2><p>Please select an article from our insights page.</p><a href="articles.html" class="btn-outline-sm">Browse Articles</a></div>`;
    return;
  }

  const articles = cfg.articles || [];
  const article = articles.find(a => a.slug === slug);

  if (!article) {
    container.innerHTML = `<div class="error-state"><h2>Article Not Found</h2><p>The article you're looking for could not be loaded.</p><a href="articles.html" class="btn-outline-sm">Browse Articles</a></div>`;
    return;
  }

  const bodyHTML = parseMarkdown(article.body || '');
  const toc = buildTOC(bodyHTML);

  const pageTitle = `${article.title || 'Article'} \u2014 ${site.name || 'KMA'}`;
  const pageUrl = `${site.url || window.location.origin}/article.html?slug=${slug}`;
  const pageImage = article.cover || (site.url ? `${site.url}/assets/og-default.jpg` : '');

  document.title = pageTitle;
  document.querySelector('meta[name="description"]').content = article.excerpt || '';
  document.querySelector('meta[property="og:title"]').content = pageTitle;
  document.querySelector('meta[property="og:description"]').content = article.excerpt || '';
  document.querySelector('meta[property="og:image"]').content = pageImage;
  document.querySelector('meta[property="og:url"]').content = pageUrl;
  document.querySelector('meta[name="twitter:title"]').content = pageTitle;
  document.querySelector('meta[name="twitter:description"]').content = article.excerpt || '';
  document.querySelector('meta[name="twitter:image"]').content = pageImage;
  document.querySelector('link[rel="canonical"]').href = pageUrl;

  const schemaEl = document.getElementById('article-schema');
  if (schemaEl) schemaEl.textContent = JSON.stringify({
    "@context": "https://schema.org", "@type": "Article",
    "headline": article.title || '',
    "description": article.excerpt || '',
    "image": pageImage,
    "datePublished": article.date || '',
    "author": { "@type": "Person", "name": article.author || site.name || 'KMA' },
    "publisher": { "@type": "Organization", "name": site.name || 'KMA', "logo": { "@type": "ImageObject", "url": (site.url || '') + '/assets/logo.png' } },
    "url": pageUrl
  });

  const coverHTML = article.cover
    ? `<div class="article-cover-wrap"><img src="${esc(article.cover)}" alt="${esc(article.title)}" class="article-cover" loading="lazy"></div>`
    : '';
  const shareHero = buildShareButtons(article.title || 'KMA Article', pageUrl);
  const shareSidebar = buildShareSidebar(article.title || 'KMA Article', pageUrl);
  const displayDate = formatDate(article.date);

  container.innerHTML = `
    <article>
      <div class="article-hero">
        <a href="articles.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          All Articles
        </a>
        <div class="article-meta-row">
          ${article.category ? `<span class="article-cat-badge">${esc(article.category)}</span>` : ''}
          ${displayDate ? `<span class="article-date-badge">${esc(displayDate)}</span>` : ''}
          ${article.readTime ? `<span class="article-read-badge">${esc(article.readTime)}</span>` : ''}
        </div>
        <h1 class="article-hero-title">${esc(article.title || 'Untitled')}</h1>
        ${article.excerpt ? `<p class="article-excerpt-lead">${esc(article.excerpt)}</p>` : ''}
        <div class="article-author-row">
          <div class="author-info">
            ${article.author ? `
            <div class="author-dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
            <div><div class="author-name">${esc(article.author)}</div><div class="author-label">${esc(site.name || 'KMA')} Partner</div></div>
            ` : ''}
          </div>
          ${shareHero}
        </div>
      </div>
      ${coverHTML}
      <div class="article-outer">
        <div class="article-layout">
          <div class="article-body">${bodyHTML}</div>
          <aside class="article-sidebar" aria-label="Article sidebar">
            ${toc}
            <div class="sidebar-card">
              <div class="sidebar-label">About This Article</div>
              <div class="sidebar-title">${esc(article.title || '')}</div>
              ${article.author ? `<div class="sidebar-author">By ${esc(article.author)} \u00B7 ${esc(site.name || 'KMA')}</div>` : ''}
              <hr class="sidebar-divider">
              <p class="sidebar-cta-text">Need expert guidance on this topic? Our partners are available for a consultation.</p>
              <a href="index.html#contact" class="btn-sm-red">Speak with a Partner</a>
            </div>
            ${shareSidebar}
          </aside>
        </div>
      </div>
      <div class="article-footer-nav">
        <a href="articles.html" class="btn-outline-sm">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          All Insights
        </a>
        <a href="index.html#contact" class="btn-outline-sm">Get in Touch \u2192</a>
      </div>
    </article>
  `;

  requestAnimationFrame(() => initTOCHighlight());
}

function initNavbar() {
  const nb = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    nb.classList.toggle('scrolled', window.scrollY > 40);
  }, { passive: true });
}

function initHamburger() {
  const btn = document.getElementById('hamburger');
  const menu = document.getElementById('mobile-menu');
  btn.addEventListener('click', () => {
    const open = menu.classList.toggle('open');
    btn.setAttribute('aria-expanded', String(open));
  });
  menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
    menu.classList.remove('open');
    btn.setAttribute('aria-expanded', 'false');
  }));
}

async function init() {
  initNavbar();
  initHamburger();
  initProgressBar();

  let cfg;
  try {
    cfg = await loadData();
  } catch (e) {
    document.getElementById('page-content').innerHTML = `<div class="error-state"><h2>Content Unavailable</h2><p>Could not load site data. Please refresh.</p></div>`;
    return;
  }

  const site = cfg.site || {};
  const addr = site.address || {};

  document.getElementById('footer-copy').textContent = `\u00A9 ${new Date().getFullYear()} ${site.name || 'Kamesh Mali & Associates'} \u00B7 All Rights Reserved`;

  const addrEl = document.getElementById('footer-addr');
  if (addr.line1) addrEl.innerHTML = `${esc(addr.line1)}, ${esc(addr.line2 || '')}<br>${esc(addr.city || '')} \u2013 ${esc(addr.pin || '')}, ${esc(addr.state || '')}`;

  await loadArticle(cfg);
}

init();
</script>
