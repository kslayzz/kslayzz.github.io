<script type="application/ld+json" id="page-schema"></script>
<style>
:root{
  --red:#8B1E1E;--red-light:#A83232;--red-dark:#6B1414;
  --white:#FAFAF8;--off-white:#F2EFEB;--grey-light:#E8E4DF;
  --grey-mid:#B5AFA8;--grey-dark:#5A534C;--black:#1A1614;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Montserrat',sans-serif;background:var(--white);color:var(--black);overflow-x:hidden;}

#navbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 4vw;height:68px;background:rgba(250,250,248,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--grey-light);transition:box-shadow 0.3s;}
#navbar.scrolled{box-shadow:0 4px 32px rgba(139,30,30,0.08);}
.logo{display:flex;align-items:center;text-decoration:none;gap:10px;}
.logo-img{height:52px;width:auto;display:block;object-fit:contain;}
.logo-fallback{display:none;flex-direction:column;}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--red);letter-spacing:0.06em;line-height:1;}
.logo-sub{font-size:0.45rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--grey-dark);margin-top:2px;}
.nav-links{display:flex;align-items:center;gap:1.8rem;list-style:none;}
.nav-links a{font-size:0.66rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--grey-dark);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover,.nav-links a.active{color:var(--red);}
.nav-cta{font-size:0.66rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--white);background:var(--red);padding:9px 18px;border:none;cursor:pointer;text-decoration:none;transition:background 0.2s;white-space:nowrap;}
.nav-cta:hover{background:var(--red-dark);}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:24px;height:2px;background:var(--red);transition:all 0.3s;}
.mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;background:var(--white);border-bottom:2px solid var(--red);padding:2rem 5vw;z-index:99;flex-direction:column;gap:1.2rem;}
.mobile-menu.open{display:flex;}
.mobile-menu a{font-size:0.8rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--grey-dark);text-decoration:none;padding:0.5rem 0;border-bottom:1px solid var(--grey-light);}

.progress-bar{position:fixed;top:68px;left:0;height:2px;background:var(--red);z-index:99;transition:width 0.1s linear;width:0%;}

.whatsapp-fab{position:fixed;bottom:2rem;right:2rem;z-index:90;width:54px;height:54px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);transition:transform 0.2s,box-shadow 0.2s;text-decoration:none;}
.whatsapp-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(37,211,102,0.5);}
.whatsapp-fab svg{width:28px;height:28px;fill:white;}

#page-content{min-height:60vh;}

.listing-hero{padding:110px 8vw 60px;background:var(--off-white);border-bottom:1px solid var(--grey-light);}
.listing-hero-label{font-size:0.58rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--red);margin-bottom:1rem;}
.listing-hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,5vw,4.4rem);font-weight:300;line-height:1.06;color:var(--black);margin-bottom:1rem;}
.listing-hero-sub{font-size:0.88rem;color:var(--grey-dark);max-width:560px;line-height:1.8;}

.filter-bar{padding:1.6rem 8vw;border-bottom:1px solid var(--grey-light);background:var(--white);display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;}
.filter-btn{font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:7px 15px;border:1px solid var(--grey-light);background:transparent;color:var(--grey-dark);cursor:pointer;transition:all 0.2s;font-family:'Montserrat',sans-serif;}
.filter-btn:hover,.filter-btn.active{background:var(--red);color:var(--white);border-color:var(--red);}

.listing-outer{padding:56px 8vw 90px;}
.listing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;max-width:1360px;margin:0 auto;}
.article-card{background:var(--white);border:1px solid var(--grey-light);display:flex;flex-direction:column;transition:box-shadow 0.25s,transform 0.25s;cursor:pointer;text-decoration:none;color:inherit;}
.article-card:hover{box-shadow:0 8px 40px rgba(139,30,30,0.1);transform:translateY(-3px);}
.card-cover{width:100%;height:200px;object-fit:cover;display:block;background:var(--grey-light);}
.card-cover-placeholder{width:100%;height:200px;background:linear-gradient(135deg,var(--off-white) 0%,var(--grey-light) 100%);display:flex;align-items:center;justify-content:center;}
.card-cover-placeholder svg{width:36px;height:36px;stroke:var(--grey-mid);}
.card-body{padding:1.5rem;display:flex;flex-direction:column;flex:1;}
.card-meta{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.9rem;flex-wrap:wrap;}
.card-cat{font-size:0.54rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--white);background:var(--red);padding:4px 10px;}
.card-date{font-size:0.6rem;color:var(--grey-mid);font-weight:500;}
.card-read{font-size:0.6rem;color:var(--grey-mid);}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.28rem;font-weight:600;line-height:1.22;color:var(--black);margin-bottom:0.7rem;}
.card-excerpt{font-size:0.78rem;line-height:1.75;color:var(--grey-dark);margin-bottom:1.2rem;flex:1;}
.card-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--grey-light);padding-top:1rem;margin-top:auto;}
.card-author{font-size:0.65rem;font-weight:600;color:var(--grey-dark);}
.card-arrow{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:5px;}
.card-arrow svg{width:12px;height:12px;transition:transform 0.2s;}
.article-card:hover .card-arrow svg{transform:translateX(4px);}

.featured-strip{max-width:1360px;margin:0 auto 2.5rem;}
.featured-card{display:grid;grid-template-columns:1fr 1fr;background:var(--white);border:1px solid var(--grey-light);border-top:3px solid var(--red);text-decoration:none;color:inherit;transition:box-shadow 0.25s;}
.featured-card:hover{box-shadow:0 8px 40px rgba(139,30,30,0.1);}
.featured-img{width:100%;height:340px;object-fit:cover;display:block;background:var(--grey-light);}
.featured-img-placeholder{width:100%;height:340px;background:linear-gradient(135deg,var(--off-white) 0%,var(--grey-light) 100%);display:flex;align-items:center;justify-content:center;}
.featured-img-placeholder svg{width:48px;height:48px;stroke:var(--grey-mid);}
.featured-body{padding:2.5rem 2.2rem;display:flex;flex-direction:column;justify-content:center;}
.featured-label{font-size:0.54rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--red);margin-bottom:1rem;}
.featured-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,2.5vw,2.4rem);font-weight:300;line-height:1.12;color:var(--black);margin-bottom:1rem;}
.featured-excerpt{font-size:0.82rem;line-height:1.8;color:var(--grey-dark);margin-bottom:1.5rem;}
.featured-meta{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.featured-meta span{font-size:0.62rem;color:var(--grey-mid);}
.btn-red-sm{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:var(--white);font-size:0.64rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:11px 20px;text-decoration:none;transition:background 0.2s;border:none;cursor:pointer;font-family:'Montserrat',sans-serif;}
.btn-red-sm:hover{background:var(--red-dark);}

.empty-state{text-align:center;padding:5rem 2rem;max-width:1360px;margin:0 auto;}
.empty-state p{font-size:0.85rem;color:var(--grey-mid);}

.article-hero{padding:110px 8vw 60px;background:var(--off-white);border-bottom:1px solid var(--grey-light);}
.back-link{display:inline-flex;align-items:center;gap:8px;font-size:0.62rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--grey-dark);text-decoration:none;margin-bottom:2.2rem;transition:color 0.2s,gap 0.2s;}
.back-link:hover{color:var(--red);gap:12px;}
.back-link svg{transform:rotate(180deg);}
.article-meta-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.4rem;flex-wrap:wrap;}
.article-cat-badge{font-size:0.58rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--white);background:var(--red);padding:5px 13px;}
.article-date-badge,.article-read-badge{font-size:0.63rem;color:var(--grey-mid);font-weight:500;}
.article-hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,4.5vw,4.2rem);font-weight:300;line-height:1.08;color:var(--black);max-width:900px;margin-bottom:1.4rem;}
.article-excerpt-lead{font-size:1.05rem;line-height:1.85;color:var(--grey-dark);max-width:720px;font-style:italic;font-family:'Cormorant Garamond',serif;border-left:3px solid var(--red);padding-left:1.4rem;margin-bottom:2rem;}
.article-author-row{display:flex;align-items:center;justify-content:space-between;gap:1.5rem;padding-top:1.5rem;border-top:1px solid var(--grey-light);flex-wrap:wrap;}
.author-info{display:flex;align-items:center;gap:1rem;}
.author-dot{width:38px;height:38px;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.author-dot svg{width:18px;height:18px;stroke:white;}
.author-name{font-size:0.76rem;font-weight:700;letter-spacing:0.04em;color:var(--black);}
.author-label{font-size:0.62rem;color:var(--grey-mid);margin-top:1px;}
.share-row{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.share-label{font-size:0.58rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--grey-mid);margin-right:0.2rem;}
.share-btn{display:inline-flex;align-items:center;gap:6px;font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:7px 13px;border:1px solid var(--grey-light);background:transparent;color:var(--grey-dark);cursor:pointer;transition:all 0.2s;text-decoration:none;font-family:'Montserrat',sans-serif;white-space:nowrap;}
.share-btn:hover{background:var(--red);color:var(--white);border-color:var(--red);}
.share-btn svg{width:12px;height:12px;flex-shrink:0;}
.share-btn.copied{background:var(--black);color:var(--white);border-color:var(--black);}

.article-cover-wrap{overflow:hidden;max-height:500px;background:var(--grey-light);}
.article-cover{width:100%;height:100%;max-height:500px;object-fit:cover;display:block;}

.article-outer{padding:60px 8vw 90px;}
.article-layout{display:grid;grid-template-columns:1fr 310px;gap:5rem;max-width:1360px;margin:0 auto;}
.article-body{min-width:0;}
.article-body h1{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;line-height:1.15;color:var(--black);margin:2.2rem 0 1rem;}
.article-body h2{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;line-height:1.18;color:var(--black);margin:2.8rem 0 1rem;padding-bottom:0.6rem;border-bottom:1px solid var(--grey-light);}
.article-body h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--black);margin:2rem 0 0.7rem;}
.article-body h4{font-size:0.76rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--red);margin:1.6rem 0 0.6rem;}
.article-body h5{font-size:0.82rem;font-weight:700;color:var(--black);margin:1.4rem 0 0.5rem;}
.article-body h6{font-size:0.78rem;font-weight:600;color:var(--grey-dark);margin:1.2rem 0 0.4rem;}
.article-body p{font-size:0.94rem;line-height:2;color:var(--grey-dark);margin-bottom:1.2rem;text-align:justify;}
.article-body strong{color:var(--black);font-weight:700;}
.article-body em{font-style:italic;}
.article-body a{color:var(--red);text-decoration:none;border-bottom:1px solid rgba(139,30,30,0.3);transition:border-color 0.2s;}
.article-body a:hover{border-color:var(--red);}
.article-body ul{margin:0.8rem 0 1.3rem 0;padding:0;list-style:none;}
.article-body ul li{font-size:0.92rem;line-height:1.9;color:var(--grey-dark);margin-bottom:0.45rem;padding-left:1.4rem;position:relative;}
.article-body ul li::before{content:'';position:absolute;left:0;top:0.72em;width:6px;height:6px;background:var(--red);border-radius:50%;}
.article-body ol{margin:0.8rem 0 1.3rem 0;padding:0;list-style:none;counter-reset:ol-counter;}
.article-body ol li{font-size:0.92rem;line-height:1.9;color:var(--grey-dark);margin-bottom:0.45rem;padding-left:2rem;position:relative;counter-increment:ol-counter;}
.article-body ol li::before{content:counter(ol-counter) ".";position:absolute;left:0;top:0;font-size:0.78rem;font-weight:700;color:var(--red);min-width:1.5rem;}
.article-body blockquote{border-left:3px solid var(--red);padding:1.1rem 1.6rem;margin:2rem 0;background:var(--off-white);}
.article-body blockquote p{margin:0;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--black);text-align:left;}
.article-body hr{border:none;border-top:1px solid var(--grey-light);margin:2.8rem 0;}
.article-body table{width:100%;border-collapse:collapse;margin:1.8rem 0;font-size:0.82rem;}
.article-body th{background:var(--red);color:var(--white);padding:11px 15px;text-align:left;font-size:0.66rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;}
.article-body td{padding:11px 15px;border-bottom:1px solid var(--grey-light);color:var(--grey-dark);line-height:1.65;}
.article-body tr:nth-child(even) td{background:var(--off-white);}
.article-body code{font-family:monospace;font-size:0.82rem;background:var(--off-white);padding:2px 6px;border:1px solid var(--grey-light);}
.article-body pre{background:var(--black);padding:1.4rem 1.6rem;overflow-x:auto;margin:1.4rem 0;}
.article-body pre code{background:none;border:none;color:rgba(255,255,255,0.85);font-size:0.82rem;padding:0;}
.article-body img{max-width:100%;height:auto;display:block;margin:1.6rem 0;}

.article-sidebar{position:sticky;top:88px;height:fit-content;display:flex;flex-direction:column;gap:1.4rem;}
.sidebar-card{background:var(--off-white);border:1px solid var(--grey-light);border-top:3px solid var(--red);padding:1.6rem;}
.sidebar-label{font-size:0.56rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--red);margin-bottom:0.8rem;}
.sidebar-title{font-family:'Cormorant Garamond',serif;font-size:1.12rem;font-weight:600;color:var(--black);line-height:1.28;margin-bottom:0.5rem;}
.sidebar-author{font-size:0.72rem;color:var(--grey-dark);line-height:1.6;}
.sidebar-divider{border:none;border-top:1px solid var(--grey-light);margin:1rem 0;}
.sidebar-cta-text{font-size:0.74rem;line-height:1.7;color:var(--grey-dark);margin-bottom:1.1rem;}
.btn-sm-red{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--red);color:var(--white);font-size:0.64rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:11px 18px;text-decoration:none;transition:background 0.2s;border:none;cursor:pointer;font-family:'Montserrat',sans-serif;width:100%;}
.btn-sm-red:hover{background:var(--red-dark);}
.toc-list{list-style:none;padding:0;}
.toc-list li{border-bottom:1px solid var(--grey-light);}
.toc-list li:last-child{border-bottom:none;}
.toc-list a{font-size:0.72rem;color:var(--grey-dark);text-decoration:none;transition:color 0.2s;line-height:1.5;display:block;padding:0.5rem 0;}
.toc-list a:hover,.toc-list a.active{color:var(--red);}
.toc-h3{padding-left:0.9rem;font-size:0.68rem;}
.share-sidebar{display:flex;flex-direction:column;gap:0.5rem;}

.article-footer-nav{padding:2.5rem 8vw;border-top:1px solid var(--grey-light);background:var(--off-white);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;}
.btn-outline-sm{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--red);font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:10px 20px;border:1px solid var(--red);text-decoration:none;transition:all 0.2s;cursor:pointer;font-family:'Montserrat',sans-serif;}
.btn-outline-sm:hover{background:var(--red);color:var(--white);}

footer{background:#6B1414;padding:2.8rem 8vw 2rem;}
.footer-bottom-simple{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.footer-copy{font-size:0.66rem;color:rgba(255,255,255,0.4);letter-spacing:0.05em;}
.footer-addr{font-size:0.66rem;color:rgba(255,255,255,0.4);text-align:right;line-height:1.7;}

.callback-modal{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;background:rgba(26,22,20,0.75);backdrop-filter:blur(4px);}
.callback-modal.open{display:flex;}
.callback-box{background:var(--white);width:100%;max-width:460px;padding:2.8rem 2.8rem 2.2rem;position:relative;margin:1rem;}
.callback-close{position:absolute;top:1.1rem;right:1.1rem;background:none;border:none;font-size:1.2rem;color:var(--grey-dark);cursor:pointer;line-height:1;padding:4px;}
.callback-close:hover{color:var(--red);}
.callback-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--black);margin-bottom:0.3rem;}
.callback-sub{font-size:0.78rem;color:var(--grey-dark);margin-bottom:1.8rem;}
.cb-form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:0.9rem;}
.cb-label{font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--grey-dark);}
.form-input{font-family:'Montserrat',sans-serif;font-size:0.82rem;color:var(--black);background:var(--off-white);border:1px solid var(--grey-light);padding:10px 14px;outline:none;transition:border-color 0.2s;width:100%;}
.form-input:focus{border-color:var(--red);}
.form-select{font-family:'Montserrat',sans-serif;font-size:0.82rem;color:var(--black);background:var(--off-white);border:1px solid var(--grey-light);padding:10px 14px;outline:none;transition:border-color 0.2s;width:100%;appearance:none;cursor:pointer;}
.form-select:focus{border-color:var(--red);}
.btn-primary{display:inline-flex;align-items:center;gap:10px;background:var(--red);color:var(--white);font-size:0.7rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;padding:14px 28px;text-decoration:none;transition:all 0.25s;position:relative;overflow:hidden;border:none;cursor:pointer;font-family:'Montserrat',sans-serif;}
.btn-primary::after{content:'';position:absolute;inset:0;background:var(--red-dark);transform:scaleX(0);transform-origin:right;transition:transform 0.3s ease;}
.btn-primary:hover::after{transform:scaleX(1);}
.btn-primary span{position:relative;z-index:1;}
.success-msg{display:none;text-align:center;padding:2rem 0 1rem;}
.success-msg .check{width:52px;height:52px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.success-msg .check svg{width:24px;height:24px;stroke:white;}
.success-msg p{font-size:0.82rem;color:var(--grey-dark);line-height:1.7;}

@media(max-width:1100px){
  .listing-grid{grid-template-columns:repeat(2,1fr);}
  .article-layout{grid-template-columns:1fr 270px;gap:3.5rem;}
}
@media(max-width:900px){
  .nav-links,.nav-cta{display:none !important;}
  .hamburger{display:flex;}
  .listing-grid{grid-template-columns:repeat(2,1fr);}
  .featured-card{grid-template-columns:1fr;}
  .featured-img,.featured-img-placeholder{height:220px;}
  .article-hero{padding:100px 6vw 50px;}
  .article-outer{padding:40px 6vw 60px;}

function normaliseBody(raw) {
  if (!raw) return '';
  var s = raw;
  if (typeof s === 'string' && s.length > 1 && s[0] === '"' && s[s.length - 1] === '"') {
    try { s = JSON.parse(s); } catch(e) {}
  }
  s = s.replace(/\\n/g, '\n').replace(/\\t/g, '\t').replace(/\\\\/g, '\\');
  return s;
}

function parseMarkdown(raw) {
  if (!raw) return '';
  var src = normaliseBody(raw);
  var lines = src.split('\n');
  var html = '';
  var i = 0;

  function slugify(s) {
    return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function parseInline(s) {
    return s
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/___(.+?)___/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/__(.+?)__/g, '<strong>$1</strong>')
      .replace(/\*([^*\n]+?)\*/g, '<em>$1</em>')
      .replace(/_([^_\n]+?)_/g, '<em>$1</em>')
      .replace(/~~(.+?)~~/g, '<del>$1</del>')
      .replace(/`([^`]+?)`/g, '<code>$1</code>');
  }

  function isULItem(line) { return /^(\s*)[-*+] /.test(line); }
  function isOLItem(line) { return /^(\s*)\d+[.)] /.test(line); }
  function isListItem(line) { return isULItem(line) || isOLItem(line); }
  function indentOf(line) { return (line.match(/^(\s*)/) || ['',''])[1].length; }

  function parseList(startIdx, baseIndent) {
    var firstLine = lines[startIdx];
    var tag = isULItem(firstLine) ? 'ul' : 'ol';
    var out = '<' + tag + '>';
    var idx = startIdx;
    while (idx < lines.length) {
      var line = lines[idx];
      if (line.trim() === '') { idx++; continue; }
      if (!isListItem(line)) break;
      var ind = indentOf(line);
      if (ind < baseIndent) break;
      if (ind > baseIndent) {
        var sub = parseList(idx, ind);
        out = out.slice(0, -(tag.length + 3)) + sub.html + '</' + tag + '>';
        idx = sub.end;
        continue;
      }
      var text = line.replace(/^\s*[-*+] /, '').replace(/^\s*\d+[.)]\s/, '');
      out += '<li>' + parseInline(text);
      idx++;
      if (idx < lines.length && isListItem(lines[idx]) && indentOf(lines[idx]) > ind) {
        var sub2 = parseList(idx, indentOf(lines[idx]));
        out += sub2.html;
        idx = sub2.end;
      }
      out += '</li>';
    }
    out += '</' + tag + '>';
    return { html: out, end: idx };
  }

  while (i < lines.length) {
    var line = lines[i];
    var trimmed = line.trim();

    if (line.startsWith('```')) {
      var lang = line.slice(3).trim();
      i++;
      var codeLines = [];
      while (i < lines.length && !lines[i].startsWith('```')) { codeLines.push(lines[i]); i++; }
      i++;
      var escaped = codeLines.map(function(l){ return l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }).join('\n');
      html += '<pre><code' + (lang ? ' class="language-' + lang + '"' : '') + '>' + escaped + '</code></pre>';
      continue;
    }

    if (/^\s*\|/.test(line) && line.includes('|')) {
      var rows = [];
      while (i < lines.length && /^\s*\|/.test(lines[i]) && lines[i].includes('|')) { rows.push(lines[i]); i++; }
      var thead = '', tbody = '', seenSep = false;
      rows.forEach(function(r, ri) {
        if (/^[\s|:-]+$/.test(r)) { seenSep = true; return; }
        var cells = r.split('|').map(function(c){ return c.trim(); }).filter(function(_, ci, a){ return ci > 0 && ci < a.length - 1; });
        if (!seenSep && ri === 0) {
          thead = '<thead><tr>' + cells.map(function(c){ return '<th>' + parseInline(c) + '</th>'; }).join('') + '</tr></thead>';
        } else {
          tbody += '<tr>' + cells.map(function(c){ return '<td>' + parseInline(c) + '</td>'; }).join('') + '</tr>';
        }
      });
      html += '<table>' + thead + '<tbody>' + tbody + '</tbody></table>';
      continue;
    }

    if (isListItem(line)) {
      var res = parseList(i, indentOf(line));
      html += res.html;
      i = res.end;
      continue;
    }

    if (/^#{1,6} /.test(line)) {
      var m = line.match(/^(#{1,6}) (.+)/);
      if (m) {
        var lvl = m[1].length;
        var headText = m[2].trim();
        var id = slugify(headText);
        html += '<h' + lvl + ' id="' + id + '">' + parseInline(headText) + '</h' + lvl + '>';
      }
      i++; continue;
    }

    if (/^> ?/.test(line)) {
      var bqLines = [];
      while (i < lines.length && /^> ?/.test(lines[i])) { bqLines.push(lines[i].replace(/^> ?/, '')); i++; }
      html += '<blockquote><p>' + parseInline(bqLines.join(' ')) + '</p></blockquote>';
      continue;
    }

    if (/^[-*_]{3,}$/.test(trimmed)) { html += '<hr>'; i++; continue; }
    if (trimmed === '') { i++; continue; }

    html += '<p>' + parseInline(trimmed) + '</p>';
    i++;
  }
  return html;
}

function buildTOC(html) {
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var headings = tmp.querySelectorAll('h2,h3');
  if (headings.length < 2) return '';
  var items = Array.from(headings).map(function(h) {
    var cls = h.tagName === 'H3' ? ' class="toc-h3"' : '';
    return '<li><a href="#' + h.id + '"' + cls + '>' + h.textContent + '</a></li>';
  }).join('');
  return '<div class="sidebar-card"><div class="sidebar-label">In This Article</div><ul class="toc-list">' + items + '</ul></div>';
}

function initTOCHighlight() {
  var links = document.querySelectorAll('.toc-list a');
  if (!links.length) return;
  var headingIds = Array.from(links).map(function(a){ return a.getAttribute('href').slice(1); });
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        links.forEach(function(a){ a.classList.remove('active'); });
        var link = document.querySelector('.toc-list a[href="#' + entry.target.id + '"]');
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-68px 0px -70% 0px' });
  headingIds.forEach(function(id){ var el = document.getElementById(id); if (el) observer.observe(el); });
}

      btn.classList.add('copied');
      setTimeout(function() {
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> Copy Link';
        btn.classList.remove('copied');
      }, 2000);
    });
  });
}

function formatDate(raw) {
  if (!raw) return '';
  var d = new Date(raw);
  if (isNaN(d.getTime())) return raw;
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
}

function initProgressBar() {
  var bar = document.getElementById('progress-bar');
  window.addEventListener('scroll', function() {
    var scrolled = window.scrollY;
    var total = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (total > 0 ? (scrolled / total * 100) : 0) + '%';
  }, { passive: true });
}

function updateOGMeta(title, description, image, url) {
  document.title = title;
  document.querySelector('meta[name="description"]').content = description;
  document.querySelector('meta[property="og:title"]').content = title;
  document.querySelector('meta[property="og:description"]').content = description;
  document.querySelector('meta[property="og:image"]').content = image;
  document.querySelector('meta[property="og:url"]').content = url;
  document.querySelector('meta[name="twitter:title"]').content = title;
  document.querySelector('meta[name="twitter:description"]').content = description;
  document.querySelector('meta[name="twitter:image"]').content = image;
  document.querySelector('link[rel="canonical"]').href = url;
}

function renderListing(cfg) {
  var articles = (cfg.articles || []).filter(function(a){ return a.slug && a.title; });
  var site = cfg.site || {};
  var siteUrl = site.url || window.location.origin;
  var pageUrl = siteUrl + '/articles.html';
  var defaultOg = siteUrl + '/assets/og-default.jpg';

  updateOGMeta(
    'Insights \u2014 ' + (site.name || 'KMA'),
    'Expert perspectives on taxation, compliance, and financial strategy from ' + (site.name || 'KMA') + '.',
    defaultOg,
    pageUrl
  );

  var schemaEl = document.getElementById('page-schema');
  if (schemaEl) schemaEl.textContent = JSON.stringify({
    "@context": "https://schema.org", "@type": "CollectionPage",
    "name": "Insights \u2014 " + (site.name || 'KMA'),
    "description": "Expert perspectives on taxation, compliance, and financial strategy.",
    "url": pageUrl,
    "publisher": { "@type": "Organization", "name": site.name || 'KMA' }
  });

  var categories = ['All'];
  articles.forEach(function(a){ if (a.category && categories.indexOf(a.category) === -1) categories.push(a.category); });

  var container = document.getElementById('page-content');

  function cardCover(a, isFeatured) {
    if (a.cover) {
      return '<img src="' + esc(a.cover) + '" alt="' + esc(a.title) + '" class="' + (isFeatured ? 'featured-img' : 'card-cover') + '" loading="lazy">';
    }
    var ph = isFeatured ? 'featured-img-placeholder' : 'card-cover-placeholder';
    return '<div class="' + ph + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';
  }

  function renderCards(list) {
    if (!list.length) return '<div class="empty-state"><p>No articles found in this category.</p></div>';
    var featured = list.filter(function(a){ return a.featured; });
    var regular = list.filter(function(a){ return !a.featured; });
    var html = '';

    if (featured.length) {
      html += '<div class="featured-strip">';
      featured.forEach(function(a) {
        var href = 'articles.html?slug=' + encodeURIComponent(a.slug);
        html += '<a href="' + href + '" class="featured-card">' +
          cardCover(a, true) +
          '<div class="featured-body">' +
          '<div class="featured-label">Featured ' + (a.category ? '\u00B7 ' + esc(a.category) : '') + '</div>' +
          '<div class="featured-title">' + esc(a.title) + '</div>' +
          (a.excerpt ? '<div class="featured-excerpt">' + esc(a.excerpt) + '</div>' : '') +
          '<div class="featured-meta">' +
          (a.date ? '<span>' + formatDate(a.date) + '</span>' : '') +
          (a.readTime ? '<span>' + esc(a.readTime) + '</span>' : '') +
          (a.author ? '<span>By ' + esc(a.author) + '</span>' : '') +
          '</div>' +
          '<span class="btn-red-sm">Read Article <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>' +
          '</div></a>';
      });
      html += '</div>';
    }

    if (regular.length) {
      html += '<div class="listing-grid">';
      regular.forEach(function(a) {
        var href = 'articles.html?slug=' + encodeURIComponent(a.slug);
        html += '<a href="' + href + '" class="article-card">' +
          cardCover(a, false) +
          '<div class="card-body">' +
          '<div class="card-meta">' +
          (a.category ? '<span class="card-cat">' + esc(a.category) + '</span>' : '') +
          (a.date ? '<span class="card-date">' + formatDate(a.date) + '</span>' : '') +
          (a.readTime ? '<span class="card-read">' + esc(a.readTime) + '</span>' : '') +
          '</div>' +
          '<div class="card-title">' + esc(a.title) + '</div>' +
          (a.excerpt ? '<div class="card-excerpt">' + esc(a.excerpt) + '</div>' : '') +
          '<div class="card-footer">' +
          (a.author ? '<span class="card-author">' + esc(a.author) + '</span>' : '<span></span>') +
          '<span class="card-arrow">Read <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>' +
          '</div></div></a>';
      });
      html += '</div>';
    }

    return html;
  }

  var filterHTML = '';
  if (categories.length > 1) {
    filterHTML = '<div class="filter-bar" id="filter-bar">' +
      categories.map(function(c, i) {
        return '<button class="filter-btn' + (i === 0 ? ' active' : '') + '" data-cat="' + esc(c) + '">' + esc(c) + '</button>';
      }).join('') +
      '</div>';
  }

  container.innerHTML =
    '<div class="listing-hero">' +
    '<div class="listing-hero-label">Insights &amp; Perspectives</div>' +
    '<h1 class="listing-hero-title">Knowledge That<br>Drives Decisions</h1>' +
    '<p class="listing-hero-sub">Expert commentary on taxation, compliance, auditing, and financial strategy from the partners of ' + esc(site.name || 'KMA') + '.</p>' +
    '</div>' +
    filterHTML +
    '<div class="listing-outer"><div id="cards-container">' + renderCards(articles) + '</div></div>';

  var filterBar = document.getElementById('filter-bar');
  if (filterBar) {
    filterBar.addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      filterBar.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      var cat = btn.dataset.cat;
      var filtered = cat === 'All' ? articles : articles.filter(function(a){ return a.category === cat; });
      document.getElementById('cards-container').innerHTML = renderCards(filtered);
    });
  }
}

function renderArticle(article, cfg) {
  var site = cfg.site || {};
  var siteUrl = site.url || window.location.origin;
  var slug = article.slug;
  var pageUrl = siteUrl + '/articles.html?slug=' + encodeURIComponent(slug);
  var pageImage = article.cover || (siteUrl + '/assets/og-default.jpg');
  var pageTitle = (article.title || 'Article') + ' \u2014 ' + (site.name || 'KMA');

  updateOGMeta(pageTitle, article.excerpt || '', pageImage, pageUrl);

  var schemaEl = document.getElementById('page-schema');
  if (schemaEl) schemaEl.textContent = JSON.stringify({
    "@context": "https://schema.org", "@type": "Article",
    "headline": article.title || '',
    "description": article.excerpt || '',
    "image": pageImage,
    "datePublished": article.date || '',
    "author": { "@type": "Person", "name": article.author || site.name || 'KMA' },
    "publisher": { "@type": "Organization", "name": site.name || 'KMA', "logo": { "@type": "ImageObject", "url": siteUrl + '/assets/logo.png' } },
    "url": pageUrl
  });

  var bodyHTML = parseMarkdown(article.body || '');
  var toc = buildTOC(bodyHTML);
  var shareHero = buildShareButtons(article.title || 'KMA Article', pageUrl);
  var shareSidebar = buildShareSidebar(article.title || 'KMA Article', pageUrl);
  var displayDate = formatDate(article.date);
  var waMsg = encodeURIComponent('Hello KMA, I read your article "' + (article.title || '') + '" and would like to speak with a partner.');

  var coverHTML = article.cover
    ? '<div class="article-cover-wrap"><img src="' + esc(article.cover) + '" alt="' + esc(article.title) + '" class="article-cover" loading="lazy"></div>'
    : '';

  var container = document.getElementById('page-content');
  container.innerHTML =
    '<article>' +
    '<div class="article-hero">' +
    '<a href="articles.html" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>All Articles</a>' +
    '<div class="article-meta-row">' +
    (article.category ? '<span class="article-cat-badge">' + esc(article.category) + '</span>' : '') +
    (displayDate ? '<span class="article-date-badge">' + esc(displayDate) + '</span>' : '') +
    (article.readTime ? '<span class="article-read-badge">' + esc(article.readTime) + '</span>' : '') +
    '</div>' +
    '<h1 class="article-hero-title">' + esc(article.title || 'Untitled') + '</h1>' +
    (article.excerpt ? '<p class="article-excerpt-lead">' + esc(article.excerpt) + '</p>' : '') +
    '<div class="article-author-row">' +
    '<div class="author-info">' +
    (article.author ? '<div class="author-dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div><div class="author-name">' + esc(article.author) + '</div><div class="author-label">' + esc(site.name || 'KMA') + ' Partner</div></div>' : '') +
    '</div>' +
    shareHero +
    '</div>' +
    '</div>' +
    coverHTML +
    '<div class="article-outer"><div class="article-layout">' +
    '<div class="article-body">' + bodyHTML + '</div>' +
    '<aside class="article-sidebar" aria-label="Article sidebar">' +
    toc +
    '<div class="sidebar-card"><div class="sidebar-label">About This Article</div><div class="sidebar-title">' + esc(article.title || '') + '</div>' +
    (article.author ? '<div class="sidebar-author">By ' + esc(article.author) + ' \u00B7 ' + esc(site.name || 'KMA') + '</div>' : '') +
    '<hr class="sidebar-divider">' +
    '<p class="sidebar-cta-text">Need expert guidance on this topic? Our partners are available for a consultation.</p>' +
    '<a href="https://wa.me/' + WA_NUMBER + '?text=' + waMsg + '" target="_blank" rel="noopener noreferrer" class="btn-sm-red" style="text-decoration:none;">Speak with a Partner</a>' +
    '</div>' +
    shareSidebar +
    '</aside>' +
    '</div></div>' +
    '<div class="article-footer-nav">' +
    '<a href="articles.html" class="btn-outline-sm"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>All Insights</a>' +
    '<a href="https://wa.me/' + WA_NUMBER + '?text=' + waMsg + '" target="_blank" rel="noopener noreferrer" class="btn-outline-sm">Contact a Partner \u2192</a>' +
    '</div>' +
    '</article>';

  requestAnimationFrame(function(){ initTOCHighlight(); });
}

function initNavbar() {
  var nb = document.getElementById('navbar');
  window.addEventListener('scroll', function(){ nb.classList.toggle('scrolled', window.scrollY > 40); }, { passive: true });
}

function initHamburger() {
  var btn = document.getElementById('hamburger');
  var menu = document.getElementById('mobile-menu');
  btn.addEventListener('click', function() {
    var open = menu.classList.toggle('open');
    btn.setAttribute('aria-expanded', String(open));
  });
  menu.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function() {
      menu.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });
  });
}

async function init() {
  initNavbar();
  initHamburger();
  initProgressBar();

  var cfg;
  try {
    cfg = await loadData();
  } catch(e) {
    document.getElementById('page-content').innerHTML = '<div style="padding:160px 8vw 100px;text-align:center;"><h2 style="font-family:\'Cormorant Garamond\',serif;font-size:2rem;font-weight:300;">Content Unavailable</h2><p style="color:#B5AFA8;margin-top:1rem;font-size:0.85rem;">Could not load site data. Please refresh.</p></div>';
    return;
  }

  var site = cfg.site || {};
  var addr = site.address || {};

  document.getElementById('footer-copy').textContent = '\u00A9 ' + new Date().getFullYear() + ' ' + (site.name || 'Kamesh Mali & Associates') + ' \u00B7 All Rights Reserved';

  var addrEl = document.getElementById('footer-addr');
  if (addr.line1) addrEl.innerHTML = esc(addr.line1) + ', ' + esc(addr.line2 || '') + '<br>' + esc(addr.city || '') + ' \u2013 ' + esc(addr.pin || '') + ', ' + esc(addr.state || '');

  var params = new URLSearchParams(window.location.search);
  var slug = params.get('slug');

  if (slug) {
    var articles = cfg.articles || [];
    var article = articles.find(function(a){ return a.slug === slug; });
    if (article) {
      renderArticle(article, cfg);
    } else {
      document.getElementById('page-content').innerHTML = '<div style="padding:160px 8vw 100px;text-align:center;"><h2 style="font-family:\'Cormorant Garamond\',serif;font-size:2rem;font-weight:300;">Article Not Found</h2><p style="color:#B5AFA8;margin-top:1rem;font-size:0.85rem;">The article you\'re looking for could not be found.</p><a href="articles.html" style="display:inline-flex;margin-top:2rem;align-items:center;gap:8px;background:transparent;color:#8B1E1E;font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:10px 20px;border:1px solid #8B1E1E;text-decoration:none;">Browse All Articles</a></div>';
    }
  } else {
    renderListing(cfg);
  }
}

init();
</script>
