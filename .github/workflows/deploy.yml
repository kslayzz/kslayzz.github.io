name: Deploy KMA Website

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [sheet-updated]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch data from Apps Script
        run: |
          mkdir -p data
          curl -L "${{ secrets.APPS_SCRIPT_URL }}" -o data/site.json
          if [ ! -s data/site.json ]; then
            echo "Failed to fetch site data" && exit 1
          fi

      - name: Validate JSON
        run: |
          python3 -c "import json,sys; json.load(open('data/site.json'))" || (echo "Invalid JSON" && exit 1)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4